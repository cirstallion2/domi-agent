name: DOMI Content Engine

on:
  schedule:
    # Market posts (Medellin UTC-5): 5AM=10UTC, 4PM=21UTC, 9PM=02UTC
    - cron: '0 10 * * *'
    - cron: '0 21 * * *'
    - cron: '0 2  * * *'
    # HeyGen scripts - staggered between post times
    - cron: '0 13 * * *'
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
    - cron: '0 0  * * *'
  workflow_dispatch:

jobs:
  content:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DOMI Content Engine
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_CONTENT_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          PERSONAL_CHAT_ID: "7419276203"
          PYTHONPATH:       ${{ github.workspace }}
        run: python run_content.py
