name: DOMI Content Engine

on:
  schedule:
    - cron: '30 10 * * *' # 5:30 AM
    - cron: '30 21 * * *' # 4:30 PM
    - cron: '30 2  * * *' # 9:30 PM
    - cron: '30 13 * * *'
    - cron: '30 16 * * *'
    - cron: '30 19 * * *'
    - cron: '30 0  * * *'
  workflow_dispatch:

jobs:
  content:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir pandas==2.2.2 numpy==1.26.4 requests==2.31.0 yfinance==0.2.54 krakenex==2.1.0
          # Verified path for pandas-ta on GitHub
          pip install https://github.com/twopirllc/pandas-ta/archive/refs/heads/main.zip

      - name: Run DOMI Content Engine
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_CONTENT_KEY }}
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          PERSONAL_CHAT_ID: "7419276203"
          X_BEARER_TOKEN:  ${{ secrets.X_BEARER_TOKEN }}
          PYTHONPATH:      ${{ github.workspace }}
        run: python run_content.py
