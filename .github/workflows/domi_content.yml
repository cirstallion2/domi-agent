name: DOMI Content Engine

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 17 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  content:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DOMI Content Engine
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY693247102287 }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PERSONAL_CHAT_ID: "7419276203"
          PYTHONPATH:       ${{ github.workspace }}
        run: |
          echo "GEMINI key present: $( [ -n "$GEMINI_API_KEY" ] && echo YES || echo NO )"
          echo "TELEGRAM token present: $( [ -n "$TELEGRAM_TOKEN" ] && echo YES || echo NO )"
          python run_content.py
