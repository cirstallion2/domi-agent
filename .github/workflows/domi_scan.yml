name: DOMI Hourly Scan
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    # STEP 1: Opt-in to Node 24 now to clear the warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      
    steps:
      # STEP 2: Use the latest action versions that support Node 24
      - name: Checkout repo
        uses: actions/checkout@v4 # v4 already supports Node 24

      - name: Set up Python
        uses: actions/setup-python@v5 # v5 is optimized for Node 24
        with:
          python-version: '3.11'
          
      # [Rest of your steps...]
