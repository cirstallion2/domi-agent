name: DOMI Morning Briefing

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DOMI Briefing
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY693247102287 }}
          KRAKEN_API_KEY:     ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_PRIVACY_KEY: ${{ secrets.KRAKEN_PRIVACY_K }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          KRAKEN_REF_LINK:    ${{ secrets.KRAKEN_REF_LINK }}
          PYTHONPATH:         ${{ github.workspace }}
        run: python run_briefing.py
